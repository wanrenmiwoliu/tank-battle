<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: auto;
  user-select: none;
}
.game-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 10px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 780px;
  max-width: 100%;
  padding: 10px 15px;
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 8px;
  flex-wrap: wrap;
  gap: 6px;
}
.header .info {
  color: #e94560;
  font-size: 16px;
  font-weight: bold;
  letter-spacing: 1px;
}
.header .info span { color: #f0c040; }
canvas {
  border: 3px solid #0f3460;
  border-radius: 4px;
  background: #0a0a0a;
  max-width: 100%;
  height: auto;
}
.controls-hint {
  color: #555;
  font-size: 13px;
  letter-spacing: 1px;
}
.controls-hint kbd {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 3px;
  padding: 2px 6px;
  color: #e94560;
  margin: 0 2px;
}

/* Start / Pause / GameOver overlay */
.screen-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 10;
}
.screen-box {
  background: rgba(0,0,0,0.9);
  border: 3px solid #e94560;
  border-radius: 12px;
  padding: 30px 50px;
  text-align: center;
  pointer-events: auto;
  display: none;
}
.screen-box.visible { display: block; }
.screen-box h1 {
  color: #f0c040;
  font-size: 42px;
  letter-spacing: 4px;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(240,192,64,0.5);
}
.screen-box .subtitle {
  color: #e94560;
  font-size: 16px;
  margin-bottom: 20px;
  letter-spacing: 2px;
}
.screen-box .stat-line {
  color: #ccc;
  font-size: 16px;
  margin: 6px 0;
  letter-spacing: 1px;
}
.screen-box .stat-line span { color: #f0c040; }
.screen-box .hint {
  color: #888;
  font-size: 14px;
  margin-top: 20px;
  animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.screen-box .small-hint {
  color: #666;
  font-size: 12px;
  margin-top: 8px;
}

/* Power-up status bar */
.powerup-status {
  display: flex;
  gap: 12px;
  align-items: center;
}
.powerup-status .pw {
  font-size: 16px;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.powerup-status .pw.active { opacity: 1; }
.powerup-status .pw .timer {
  font-size: 10px;
  color: #aaa;
}
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="info">🏆 得分: <span id="score">0</span></div>
    <div class="info">👑 最高: <span id="high-score">0</span></div>
    <div class="info">🛡️ 基地: <span id="base-hp">3</span></div>
    <div class="info">💀 击杀: <span id="kills">0</span></div>
    <div class="info">🎯 关卡: <span id="level">1</span></div>
    <div class="info">❤️ <span id="lives">3</span></div>
    <div class="powerup-status">

      <span class="pw" id="pw-pierce">🔫<span class="timer"></span></span>

const keys = {};
window.addEventListener('keydown', e => {

    if (gameState === STATE.MENU) startGame();
    else if (gameState === STATE.PAUSED) resumeGame();
    else if (gameState === STATE.GAMEOVER) startGame();
  }
  if (e.key.toLowerCase() === 'p' && (gameState === STATE.PLAYING || gameState === STATE.PAUSED)) {
    if (gameState === STATE.PLAYING) pauseGame(); else resumeGame();
  }
  if (e.key.toLowerCase() === 'r') startGame();
  e.preventDefault();

function playBeep(freq, duration, type = 'square', vol = 0.06) {
  if (!audioCtx) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}
function sfxShoot()     { playBeep(200, 0.1, 'square', 0.05); }

function sfxPickup()    { playBeep(600, 0.1, 'square', 0.04); playBeep(900, 0.1, 'square', 0.04); }
function sfxLevelUp()   { playBeep(440, 0.12, 'square', 0.05); setTimeout(() => playBeep(660, 0.12, 'square', 0.05), 120); setTimeout(() => playBeep(880, 0.15, 'square', 0.05), 240); }

// ====== HIGH SCORE ======
try { highScore = parseInt(localStorage.getItem('tankBattleHigh') || '0'); } catch(e) { highScore = 0; }
function saveHigh() {
  if (score > highScore) { highScore = score; try { localStorage.setItem('tankBattleHigh', highScore); } catch(e) {} }
}

// ====== CLASSES ======
class Tank {
  constructor(x, y, dir, color, isPlayer = false, enemyType = null) {
    this.x = x; this.y = y; this.dir = dir;
    this.color = color; this.isPlayer = isPlayer;
    this.size = TANK_SIZE;
    this.enemyType = enemyType; // { speed, hp, color, score, chaseChance }
    if (enemyType) {
      this.speed = enemyType.speed; this.hp = enemyType.hp; this.scoreVal = enemyType.score;
      this.chaseChance = enemyType.chaseChance;
    } else {
      this.speed = isPlayer ? 2.5 : 1.2; this.hp = 1; this.scoreVal = 100; this.chaseChance = 0.35;
    }
    this.shootCooldown = 0;
    this.shootDelay = isPlayer ? 20 : 80;
    this.active = true;
    this.flashTimer = 0;
    this.moveTimer = Math.random() * 60;
    this.dirChangeDelay = 50 + Math.random() * 70;
    this.stuckCheckX = x; this.stuckCheckY = y; this.stuckTimer = 0;
    this.muzzleFlash = 0;
  }

  update() {
    if (this.flashTimer > 0) this.flashTimer--;
    if (this.shootCooldown > 0) this.shootCooldown--;
    if (this.muzzleFlash > 0) this.muzzleFlash--;
    if (!this.active) return;

    // Apply player power to speed/shootDelay
    if (this.isPlayer) {
      this.speed = 2.5 + playerPower * 0.6;
      this.shootDelay = Math.max(8, 20 - playerPower * 4);
      this.handleInput();
    } else {
      if (freezeTimer > 0) return;
      this.handleAI();
    }
  }

  handleInput() {
    let dx = 0, dy = 0, newDir = this.dir;
    if (keys['arrowup']    || keys['w']) { dy = -1; newDir = 'up'; }
    else if (keys['arrowdown']  || keys['s']) { dy =  1; newDir = 'down'; }
    else if (keys['arrowleft']  || keys['a']) { dx = -1; newDir = 'left'; }
    else if (keys['arrowright'] || keys['d']) { dx =  1; newDir = 'right'; }
    this.dir = newDir;

    if (dx !== 0 || dy !== 0) {
      const nx = this.x + dx * this.speed, ny = this.y + dy * this.speed;
      if (this.canMoveTo(nx, ny)) { this.x = nx; this.y = ny; }
      else if (dx !== 0 && this.canMoveTo(nx, this.y)) { this.x = nx; }
      else if (dy !== 0 && this.canMoveTo(this.x, ny)) { this.y = ny; }
    }
    if ((keys[' '] || keys['space'] || keys['j']) && this.shootCooldown <= 0) this.shoot();
  }

  handleAI() {
    this.moveTimer--;
    // Stuck detection
    const distMoved = Math.abs(this.x - this.stuckCheckX) + Math.abs(this.y - this.stuckCheckY);
    this.stuckTimer++;
    if (this.stuckTimer > 90 || (this.stuckTimer > 40 && distMoved < 3)) {
      this.stuckTimer = 0; this.stuckCheckX = this.x; this.stuckCheckY = this.y;
      this.moveTimer = 0; // force redirect
    }

    if (this.moveTimer <= 0) {
      this.moveTimer = this.dirChangeDelay;
      const dirs = ['up', 'down', 'left', 'right'];
      if (player && player.active && Math.random() < this.chaseChance) {
        const dx = player.x - this.x, dy = player.y - this.y;
        this.dir = Math.abs(dx) > Math.abs(dy)
          ? (dx > 0 ? 'right' : 'left')
          : (dy > 0 ? 'down' : 'up');
      } else {
        // Avoid picking same direction that was blocked
        const prev = this.dir;
        this.dir = dirs[Math.floor(Math.random() * 4)];
        if (Math.random() < 0.6 && this.dir === prev) this.dir = dirs[Math.floor(Math.random() * 4)];
      }
      this.dirChangeDelay = 40 + Math.random() * 80;
    }

    let dx = 0, dy = 0;
    switch (this.dir) { case 'up': dy = -1; break; case 'down': dy = 1; break; case 'left': dx = -1; break; case 'right': dx = 1; break; }
    const nx = this.x + dx * this.speed, ny = this.y + dy * this.speed;
    if (this.canMoveTo(nx, ny)) {
      this.x = nx; this.y = ny;
    } else {
      // Try slide along wall (perpendicular)
      let slid = false;
      if (dx !== 0) {
        for (const sign of [1, -1]) {
          const sy = this.y + sign * this.speed;
          if (this.canMoveTo(this.x, sy)) { this.y = sy; slid = true; break; }
        }
      }
      if (!slid && dy !== 0) {
        for (const sign of [1, -1]) {
          const sx = this.x + sign * this.speed;
          if (this.canMoveTo(sx, this.y)) { this.x = sx; slid = true; break; }
        }
      }
      if (!slid) this.moveTimer = 0;
    }

    // Shoot
    if (this.shootCooldown <= 0 && player && player.active) {
      const dx = player.x - this.x, dy = player.y - this.y, dist = Math.sqrt(dx*dx+dy*dy);
      const aligned = (this.dir === 'up' && dy < 0 && Math.abs(dx) < 70)
        || (this.dir === 'down' && dy > 0 && Math.abs(dx) < 70)
        || (this.dir === 'left' && dx < 0 && Math.abs(dy) < 70)
        || (this.dir === 'right' && dx > 0 && Math.abs(dy) < 70);
      if (aligned && dist < 350) this.shoot();
      else if (Math.random() < 0.012) this.shoot();
    }
  }

  canMoveTo(nx, ny) {
    const half = this.size / 2;
    if (nx - half < 0 || nx + half > W || ny - half < 0 || ny + half > H) return false;
    const corners = [{x:nx-half,y:ny-half},{x:nx+half,y:ny-half},{x:nx-half,y:ny+half},{x:nx+half,y:ny+half}];
    for (const c of corners) {
      const col = Math.floor(c.x / CELL), row = Math.floor(c.y / CELL);
      if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
        const cell = map[row]?.[col];
        if (cell === '#' || cell === '*') return false;
      }
    }
    const allTanks = this.isPlayer ? enemies : [player, ...enemies];
    for (const t of allTanks) {
      if (!t || !t.active || t === this) continue;
      if (Math.abs(nx - t.x) < half + t.size/2 - 2 && Math.abs(ny - t.y) < half + t.size/2 - 2) return false;
    }
    if (this.isPlayer) {
      const bx = Math.floor(COLS/2)*CELL+CELL/2, by = (ROWS-1)*CELL+CELL/2;
      if (Math.abs(nx - bx) < half + CELL/2 - 2 && Math.abs(ny - by) < half + CELL/2 - 2) return false;
    }
    return true;
  }

  shoot() {
    if (this.shootCooldown > 0) return;
    this.shootCooldown = this.shootDelay;
    this.muzzleFlash = 5;
    const bx = this.x, by = this.y;
    bullets.push(new Bullet(bx, by, this.dir, this.isPlayer));
    if (this.isPlayer && playerPower >= 2) {
      // Double shot at level 2+
      const offX = this.dir === 'up' || this.dir === 'down' ? 8 : 0;
      const offY = this.dir === 'left' || this.dir === 'right' ? 8 : 0;
      bullets.push(new Bullet(bx + offX, by + offY, this.dir, true));
      bullets.push(new Bullet(bx - offX, by - offY, this.dir, true));
    }
    sfxShoot();
  }

  hit() {
    if (this.isPlayer && shieldTimer > 0) return; // shield blocks
    this.flashTimer = 8;
    this.hp--;
    if (this.hp <= 0) {
      this.active = false;
      spawnExplosion(this.x, this.y, true);
      if (!this.isPlayer) {
        const pts = this.scoreVal || 100;
        score += pts;
        kills++;
        enemiesRemaining--;
        addFloatingText(this.x, this.y, '+' + pts, '#f0c040');
        tryDropPowerUp(this.x, this.y);
        updateUI();
        sfxExplosion();
      }
    }
  }

  draw() {
    if (!this.active) return;
    if (this.flashTimer > 0 && this.flashTimer % 2 === 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    const angle = { up: 0, down: Math.PI, left: -Math.PI/2, right: Math.PI/2 }[this.dir];
    ctx.rotate(angle);
    const s = this.size, hs = s / 2;

    // Tracks
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-hs, -hs, s, 6);
    ctx.fillRect(-hs, hs - 6, s, 6);
    ctx.fillStyle = '#333';
    for (let i = -hs + 3; i < hs; i += 5) { ctx.fillRect(i, -hs, 2, 6); ctx.fillRect(i, hs - 6, 2, 6); }

    // Body
    const bodyColor = this.isPlayer ? '#2ecc71' : this.color;
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-hs + 3, -hs + 6, s - 6, s - 12);
    ctx.fillStyle = this.isPlayer ? '#44ee88' : lighten(bodyColor, 30);
    ctx.fillRect(-hs + 4, -hs + 7, s - 10, (s - 14) / 2);

    // Player power stars
    if (this.isPlayer && playerPower > 0) {
      ctx.fillStyle = '#f0c040';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      for (let i = 0; i < playerPower; i++) ctx.fillText('★', -6 + i * 12, hs - 12);
    }

    // Turret
    ctx.fillStyle = this.isPlayer ? '#27ae60' : darken(bodyColor, 30);
    ctx.beginPath(); ctx.arc(0, 0, hs - 6, 0, Math.PI * 2); ctx.fill();

    // Barrel
    ctx.fillStyle = '#888'; ctx.fillRect(-3, -hs, 6, hs - 4);
    ctx.fillStyle = '#aaa'; ctx.fillRect(-3, -hs, 6, 5);

    // Muzzle flash
    if (this.muzzleFlash > 0) {
      ctx.fillStyle = '#ff0';
      ctx.shadowColor = '#ff0'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(0, -hs - 3, 4 + Math.random() * 3, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Shield glow
    if (this.isPlayer && shieldTimer > 0) {
      ctx.strokeStyle = 'rgba(68,255,136,0.6)';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, hs + 4, 0, Math.PI * 2); ctx.stroke();
    }

    ctx.restore();
  }
}

class Bullet {
  constructor(x, y, dir, isPlayer) {
    this.x = x; this.y = y; this.dir = dir; this.isPlayer = isPlayer;
    this.speed = 5; this.size = 4; this.active = true;
  }

  update() {
    switch (this.dir) { case 'up': this.y -= this.speed; break; case 'down': this.y += this.speed; break; case 'left': this.x -= this.speed; break; case 'right': this.x += this.speed; break; }
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) { this.active = false; return; }

    const col = Math.floor(this.x / CELL), row = Math.floor(this.y / CELL);
    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      const cell = map[row]?.[col];
      if (cell === '#') {
        if (this.isPlayer && pierceTimer > 0) {
          map[row][col] = '.';
          spawnParticles(this.x, this.y, '#a0522d', 5);
        } else {
          this.active = false;
          spawnParticles(this.x, this.y, '#888', 5);
          sfxHit();
          return;
        }
      }
      if (cell === '*') {
        if (this.isPlayer) { map[row][col] = '.'; spawnParticles(this.x, this.y, '#ccc', 5); sfxHit(); }
        this.active = false; return;
      }
      if (cell === 'B') {
        this.active = false; baseHP--;
        spawnExplosion(this.x, this.y, true);
        triggerShake(6, 20);
        updateUI();
        if (baseHP <= 0) gameOverLose();
        return;
      }
    }

    if (this.isPlayer) {
      for (const e of enemies) {
        if (!e.active) continue;
        if (Math.abs(this.x - e.x) < e.size/2 && Math.abs(this.y - e.y) < e.size/2) { this.active = false; e.hit(); return; }
      }
    } else {
      if (player && player.active && Math.abs(this.x - player.x) < player.size/2 && Math.abs(this.y - player.y) < player.size/2) {
        this.active = false; player.hit();
        if (!player.active) { lives--; updateUI(); if (lives <= 0) gameOverLose(); else respawnPlayer(); }
        return;
      }
    }

    // Bullet vs bullet
    for (const o of bullets) {
      if (o === this || !o.active) continue;
      if (o.isPlayer !== this.isPlayer && Math.abs(this.x - o.x) < 6 && Math.abs(this.y - o.y) < 6) {
        this.active = false; o.active = false; spawnParticles(this.x, this.y, '#ff0', 4); return;
      }
    }
  }

  draw() {
    if (!this.active) return;
    ctx.fillStyle = this.isPlayer ? '#f0c040' : '#ff6666';
    ctx.shadowColor = this.isPlayer ? '#ff0' : '#f00'; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

class Particle {
  constructor(x, y, color, life = 20) {
    this.x = x; this.y = y; this.color = color;
    this.vx = (Math.random() - 0.5) * 5; this.vy = (Math.random() - 0.5) * 5 - 2;
    this.life = life + Math.random() * life * 0.5; this.max = this.life;
    this.size = 1 + Math.random() * 3;
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.life--; return this.life > 0; }
  draw() {
    const a = this.life / this.max;
    ctx.fillStyle = this.color; ctx.globalAlpha = a;
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y = y; this.type = type;
    this.life = 600; // 10 seconds
    this.size = 12;
    this.pulse = 0;
  }
  update() { this.life--; this.pulse += 0.1; return this.life > 0; }
  draw() {
    if (this.life < 120 && Math.floor(this.life / 15) % 2 === 0) return; // blink before expire
    const pulseR = this.size + Math.sin(this.pulse) * 3;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(this.x, this.y, pulseR + 4, 0, Math.PI*2); ctx.fill();

    const cfg = POWERUP_CFG[this.type];
    ctx.fillStyle = cfg.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, pulseR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${this.size + 4}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(cfg.icon, this.x, this.y);
  }
}

class FloatingText {
  constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 40; this.max = 40; }
  update() { this.y -= 1.2; this.life--; return this.life > 0; }
  draw() {
    const a = this.life / this.max;
    ctx.fillStyle = this.color; ctx.globalAlpha = a;
    ctx.font = 'bold 14px "Courier New", monospace'; ctx.textAlign = 'center';
    ctx.fillText(this.text, this.x, this.y);
    ctx.globalAlpha = 1;
  }
}

function lighten(c, p) { const n = parseInt(c.replace('#',''),16); const r = Math.min(255,(n>>16)+p), g = Math.min(255,((n>>8)&0xFF)+p), b = Math.min(255,(n&0xFF)+p); return '#'+(0x1000000+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function darken(c, p)  { const n = parseInt(c.replace('#',''),16); const r = Math.max(0,(n>>16)-p), g = Math.max(0,((n>>8)&0xFF)-p), b = Math.max(0,(n&0xFF)-p); return '#'+(0x1000000+(r<<16)+(g<<8)+b).toString(16).slice(1); }

// ====== POWER-UPS ======
const POWERUP_CFG = {
  star:   { color: '#f0c040', icon: '⭐', chance: 0.28, apply() { if (playerPower < 3) { playerPower++; addFloatingText(player.x, player.y-20, '升级! Lv'+(playerPower+1), '#f0c040'); } }},
  bomb:   { color: '#ff4444', icon: '💣', chance: 0.14, apply() { for (const e of enemies) { if (e.active) { e.hp = 0; e.hit(); } } triggerShake(10, 25); }},
  clock:  { color: '#44ccff', icon: '⏱️', chance: 0.14, apply() { freezeTimer = 180; addFloatingText(player.x, player.y-20, '冻结!', '#44ccff'); }},
  shield: { color: '#44ff44', icon: '🛡️', chance: 0.14, apply() { shieldTimer = 300; addFloatingText(player.x, player.y-20, '护盾!', '#44ff44'); }},
  life:   { color: '#ff88cc', icon: '❤️', chance: 0.10, apply() { lives = Math.min(9, lives + 1); addFloatingText(player.x, player.y-20, '+1 生命', '#ff88cc'); }},
  pierce: { color: '#ff8800', icon: '🔫', chance: 0.20, apply() { pierceTimer = 600; addFloatingText(player.x, player.y-20, '穿甲弹!', '#ff8800'); }},
};

function tryDropPowerUp(x, y) {
  if (Math.random() > 0.32) return;
  const types = Object.keys(POWERUP_CFG);
  const roll = Math.random();
  let cum = 0;
  for (const t of types) {
    cum += POWERUP_CFG[t].chance;
    if (roll < cum) { powerUps.push(new PowerUp(x, y, t)); return; }
  }
}

function collectPowerUp(pw) {
  const cfg = POWERUP_CFG[pw.type];
  if (cfg.apply) cfg.apply();
  sfxPickup();
  updateUI();
}

// ====== EFFECTS ======
function spawnExplosion(x, y, big = false) {
  const colors = ['#ff4444', '#ff8800', '#ffcc00', '#ffffff', '#ff6600'];
  const count = big ? 30 : 15;
  for (let i = 0; i < count; i++) particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)], big ? 25 : 18));
  if (big) triggerShake(5, 15);
}
function spawnParticles(x, y, color, n) { for (let i = 0; i < n; i++) particles.push(new Particle(x, y, color, 12)); }
function addFloatingText(x, y, text, color) { floatingTexts.push(new FloatingText(x, y, text, color)); }
function triggerShake(amount, dur) { shakeX = amount; shakeY = amount; shakeDur = dur; }

// ====== UI ======
function updateUI() {
  scoreEl.textContent = score;
  highScoreEl.textContent = highScore;
  baseHpEl.textContent = baseHP;
  killsEl.textContent = kills;
  levelEl.textContent = level;
  livesEl.textContent = lives;
  // Power-up indicators
  pwStar.classList.toggle('active', playerPower > 0);
  if (playerPower > 0) pwStar.querySelector('.timer').textContent = 'Lv' + (playerPower+1);
  pwShield.classList.toggle('active', shieldTimer > 0);
  if (shieldTimer > 0) pwShield.querySelector('.timer').textContent = Math.ceil(shieldTimer / 60) + 's';
  pwPierce.classList.toggle('active', pierceTimer > 0);
  if (pierceTimer > 0) pwPierce.querySelector('.timer').textContent = Math.ceil(pierceTimer / 60) + 's';
}

function showScreen(name) {
  [menuScreen, pauseScreen, gameoverScreen].forEach(s => s.classList.remove('visible'));
  if (name === 'menu') menuScreen.classList.add('visible');
  else if (name === 'pause') pauseScreen.classList.add('visible');
  else if (name === 'gameover') gameoverScreen.classList.add('visible');
  screenOverlay.style.display = name ? 'flex' : 'none';
}

function respawnPlayer() {
  const sx = Math.floor(COLS/2)*CELL+CELL/2, sy = (ROWS-2)*CELL+CELL/2;
  player = new Tank(sx, sy, 'up', '#2ecc71', true);
  player.flashTimer = 90;
  playerPower = 0; shieldTimer = 0; pierceTimer = 0;
}

function pauseGame() {
  gameState = STATE.PAUSED;
  showScreen('pause');
}

function resumeGame() {
  gameState = STATE.PLAYING;
  showScreen(null);
}

function gameOverLose() {
  gameState = STATE.GAMEOVER;
  saveHigh();
  document.getElementById('go-title').textContent = '💀 游戏结束';
  document.getElementById('go-level').textContent = level;
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-kills').textContent = kills;
  document.getElementById('go-high').textContent = highScore;
  showScreen('gameover');
  sfxExplosion();
}

function gameOverWin() {
  gameState = STATE.GAMEOVER;
  saveHigh();
  document.getElementById('go-title').textContent = '🎉 恭喜通关!';
  document.getElementById('go-level').textContent = level;
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-kills').textContent = kills;
  document.getElementById('go-high').textContent = highScore;
  showScreen('gameover');
  sfxLevelUp();
}

function nextLevel() {
  level++;
  levelTransition = 70;
  sfxLevelUp();
  initLevel();
}

// ====== INIT ======
function initLevel() {
  map = getMap(level);
  enemies = []; bullets = []; particles = []; powerUps = []; floatingTexts = [];
  enemiesSpawned = 0;
  enemiesPerLevel = 4 + (level - 1) * 2;
  enemiesRemaining = enemiesPerLevel;
  enemySpawnTimer = 0;
  baseHP = Math.min(3, baseHP); // restore if partially damaged

  // Place base
  const baseCol = Math.floor(COLS / 2), baseRow = ROWS - 1;
  map[baseRow][baseCol] = 'B';

  // Clear player spawn
  const spawnCol = Math.floor(COLS / 2);
  for (let r = ROWS - 3; r < ROWS - 1; r++)
    for (let c = spawnCol - 1; c <= spawnCol + 1; c++)
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS && map[r][c] !== 'B') map[r][c] = '.';

  // Clear enemy spawn
  for (const sc of [1, Math.floor(COLS/2), COLS-2])
    for (let r = 0; r <= 2; r++)
      for (let c = sc - 1; c <= sc + 1; c++)
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
          const cell = map[r][c];
          if (cell !== '#' && cell !== '*' && cell !== 'B') map[r][c] = '.';
        }

  if (!player || !player.active) respawnPlayer();
  player.x = spawnCol * CELL + CELL / 2;
  player.y = (ROWS - 2) * CELL + CELL / 2;
  player.dir = 'up'; player.active = true; player.flashTimer = 90;
  // Keep power-ups across levels
  freezeTimer = 0;
  updateUI();
}

function spawnEnemy() {
  if (enemiesSpawned >= enemiesPerLevel) return;
  const cols = [1, Math.floor(COLS/2), COLS-2];
  const col = cols[Math.floor(Math.random() * 3)];
  const x = col * CELL + CELL/2, y = CELL + CELL/2;
  for (const e of enemies) { if (e.active && Math.abs(x-e.x) < TANK_SIZE && Math.abs(y-e.y) < TANK_SIZE) return; }
  if (player && player.active && Math.abs(x-player.x) < TANK_SIZE && Math.abs(y-player.y) < TANK_SIZE) return;

  // Enemy type distribution changes with level
  const roll = Math.random();
  let etype;
  if (roll < 0.25 + level * 0.02) etype = ENEMY_TYPES.heavy;
  else if (roll < 0.55 + level * 0.02) etype = ENEMY_TYPES.scout;
  else etype = ENEMY_TYPES.soldier;

  enemies.push(new Tank(x, y, 'down', etype.color, false, etype));
  enemiesSpawned++;
}

function startGame() {
  score = 0; kills = 0; level = 1; lives = 3; baseHP = 3;
  player = null; enemies = []; bullets = []; particles = []; powerUps = []; floatingTexts = [];
  levelTransition = 0;
  playerPower = 0; shieldTimer = 0; pierceTimer = 0; freezeTimer = 0;
  shakeX = 0; shakeY = 0; shakeDur = 0;
  gameState = STATE.PLAYING;
  showScreen(null);
  initLevel();
  updateUI();
}

// ====== DRAW ======
function drawMap() {
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const x = col * CELL, y = row * CELL, cell = map[row]?.[col];
      if (cell === '#') {
        ctx.fillStyle = '#8b4513'; ctx.fillRect(x, y, CELL, CELL);
        ctx.fillStyle = '#a0522d';
        ctx.fillRect(x+2, y+2, CELL/2-2, CELL/2-2);
        ctx.fillRect(x+CELL/2, y+CELL/2, CELL/2-2, CELL/2-2);
        ctx.fillStyle = '#6b3410'; ctx.fillRect(x, y, CELL, 1); ctx.fillRect(x, y, 1, CELL);
      } else if (cell === '*') {
        ctx.fillStyle = '#777'; ctx.fillRect(x, y, CELL, CELL);
        ctx.fillStyle = '#999'; ctx.fillRect(x+3, y+3, CELL-6, CELL-6);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(x+5, y+5, CELL/2-5, CELL/2-5);
        ctx.fillRect(x+CELL/2, y+CELL/2, CELL/2-5, CELL/2-5);
      } else if (cell === 'B') {
        ctx.fillStyle = '#222'; ctx.fillRect(x, y, CELL, CELL);
        const eagleColor = baseHP >= 3 ? '#f0c040' : baseHP >= 2 ? '#e67e22' : '#e74c3c';
        ctx.fillStyle = eagleColor;
        ctx.beginPath();
        ctx.moveTo(x+5, y+CELL-5); ctx.lineTo(x+CELL/2, y+5);
        ctx.lineTo(x+CELL-5, y+CELL-5); ctx.lineTo(x+CELL/2, y+CELL-10);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(x+CELL/2, y+CELL/2-2, 3, 0, Math.PI*2); ctx.fill();
      } else if (cell === 'T') {
        ctx.fillStyle = '#1a3a1a'; ctx.fillRect(x, y, CELL, CELL);
        ctx.fillStyle = '#2d5a27';
        ctx.beginPath(); ctx.arc(x+CELL/2, y+CELL/2, CELL/2-1, 0, Math.PI*2); ctx.fill();
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Screen shake
  let sx = 0, sy = 0;
  if (shakeDur > 0) {
    sx = (Math.random() - 0.5) * shakeX * 2;
    sy = (Math.random() - 0.5) * shakeY * 2;
  }
  ctx.save();
  ctx.translate(sx, sy);

  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(-5, -5, W+10, H+10);

  // Grid
  ctx.strokeStyle = '#111'; ctx.lineWidth = 0.5;
  for (let x = 0; x <= W; x += CELL) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += CELL) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  drawMap();

  // Particles
  for (const p of particles) p.draw();

  // Power-ups
  for (const pw of powerUps) pw.draw();

  // Base pulse
  const bc = Math.floor(COLS/2), br = ROWS-1;
  if (map[br]?.[bc] === 'B') {
    ctx.strokeStyle = baseHP <= 1 ? '#f00' : '#f0c040'; ctx.lineWidth = 2;
    ctx.globalAlpha = Math.sin(Date.now()/200)*0.3+0.7;
    ctx.strokeRect(bc*CELL-1, br*CELL-1, CELL+2, CELL+2);
    ctx.globalAlpha = 1;
  }

  // Tanks
  if (player && player.active) player.draw();
  for (const e of enemies) { if (e.active || e.flashTimer > 0) e.draw(); }

  // Bullets
  for (const b of bullets) { if (b.active) b.draw(); }

  // Floating texts
  for (const ft of floatingTexts) ft.draw();

  // Freeze overlay
  if (freezeTimer > 0) {
    ctx.fillStyle = 'rgba(68,204,255,0.06)'; ctx.fillRect(-5, -5, W+10, H+10);
  }

  ctx.restore();

  // Level transition (outside shake)
  if (levelTransition > 0) {
    ctx.fillStyle = `rgba(0,0,0,${levelTransition/70*0.6})`;
    ctx.fillRect(0, 0, W, H);
    if (levelTransition > 20) {
      ctx.fillStyle = '#f0c040'; ctx.font = 'bold 36px "Courier New", monospace'; ctx.textAlign = 'center';
      ctx.fillText(`第 ${level} 关`, W/2, H/2);
    }
  }

  // Pause dim
  if (gameState === STATE.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
  }
}

// ====== UPDATE ======
function update() {
  if (gameState !== STATE.PLAYING) return;

  // Timers
  if (shieldTimer > 0) shieldTimer--;
  if (pierceTimer > 0) pierceTimer--;
  if (freezeTimer > 0) freezeTimer--;

  // Shake decay
  if (shakeDur > 0) { shakeDur--; shakeX *= 0.9; shakeY *= 0.9; if (shakeDur === 0) { shakeX = 0; shakeY = 0; } }

  if (levelTransition > 0) { levelTransition--; return; }

  try {
    if (player && player.active) player.update();

    // Spawn enemies
    if (enemiesRemaining > 0 && enemiesSpawned < enemiesPerLevel) {
      enemySpawnTimer--;
      const maxOn = Math.min(4, enemiesRemaining);
      if (enemySpawnTimer <= 0 && enemies.filter(e => e.active).length < maxOn) { spawnEnemy(); enemySpawnTimer = enemySpawnDelay; }
    }

    for (const e of enemies) { if (e.active) e.update(); }
    for (const b of bullets) { if (b.active) b.update(); }
    particles = particles.filter(p => p.update());
    powerUps = powerUps.filter(p => p.update());
    floatingTexts = floatingTexts.filter(f => f.update());
    bullets = bullets.filter(b => b.active);

    // PowerUp pickup
    if (player && player.active) {
      for (const pw of powerUps) {
        if (Math.abs(pw.x - player.x) < player.size/2 + pw.size && Math.abs(pw.y - player.y) < player.size/2 + pw.size) {
          collectPowerUp(pw);
          pw.life = 0;
        }
      }
    }
    powerUps = powerUps.filter(p => p.life > 0);

    // Level complete?
    const alive = enemies.filter(e => e.active).length;
    if (enemiesRemaining <= 0 && alive === 0 && enemiesSpawned >= enemiesPerLevel) {
      score += 500; updateUI();
      if (level >= MAPS.length * 3) gameOverWin(); else nextLevel();
    }

    if (baseHP <= 0) gameOverLose();
    updateUI();
  } catch(e) { console.error('Update error:', e); }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ====== START ======
showScreen('menu');
highScoreEl.textContent = highScore;
gameLoop();

  });

}
</script>
